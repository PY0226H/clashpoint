fail_fast: false
default_install_hook_types: [pre-commit, pre-push, commit-msg]
default_stages: [commit, manual]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-byte-order-marker
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        name: ruff check (ai_judge_service)
        files: ^ai_judge_service/.*\.py$
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff format (ai_judge_service)
        files: ^ai_judge_service/.*\.py$
  - repo: local
    hooks:
      - id: ai-judge-pyright
        name: ai_judge pyright
        description: Run strict-scoped pyright checks for ai_judge_service.
        entry: bash -c 'cd ai_judge_service && .venv/bin/pyright'
        language: system
        files: ^ai_judge_service/
        pass_filenames: false
        stages: [pre-push]
      - id: ai-judge-mypy
        name: ai_judge mypy
        description: Run staged strict mypy checks for ai_judge_service.
        entry: bash -c 'cd ai_judge_service && .venv/bin/mypy'
        language: system
        files: ^ai_judge_service/
        pass_filenames: false
        stages: [pre-push]
      - id: ai-judge-pytest
        name: ai_judge pytest
        description: Run ai_judge_service tests via pytest.
        entry: bash -c 'cd ai_judge_service && .venv/bin/pytest -q'
        language: system
        files: ^ai_judge_service/
        pass_filenames: false
        stages: [pre-push]
      - id: cargo-fmt
        name: cargo fmt
        description: Format files with rustfmt.
        entry: bash -c 'for dir in chat swiftide-pgvector frontend/apps/desktop/src-tauri; do (cd $dir && cargo fmt -- --check) || exit 1; done'
        language: rust
        files: \.rs$
        args: []
      - id: cargo-deny
        name: cargo deny check
        description: Check cargo dependencies
        entry: bash -c 'for dir in chat swiftide-pgvector frontend/apps/desktop/src-tauri; do (cd $dir && cargo deny check -d) || exit 1; done'
        language: rust
        files: \.rs$
        args: []
      - id: typos
        name: typos
        description: check typo
        entry: bash -c 'typos'
        language: rust
        files: \.*$
        pass_filenames: false
      - id: backend-file-size-guard
        name: backend file size guard
        description: Block newly added oversized backend files and baseline growth.
        entry: bash scripts/quality/check_oversized_backend_files.sh --threshold 700
        language: system
        files: ^(chat/.*/src/.*\.rs|ai_judge_service/app/.*\.py)$
        pass_filenames: false
      - id: cargo-check
        name: cargo check
        description: Check the package for errors.
        entry: bash -c 'for dir in chat swiftide-pgvector frontend/apps/desktop/src-tauri; do (cd $dir && cargo check --all) || exit 1; done'
        language: rust
        files: \.rs$
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        description: Lint rust sources
        entry: bash -c 'for dir in chat swiftide-pgvector frontend/apps/desktop/src-tauri; do (cd $dir && cargo clippy --all-targets --all-features --tests --benches -- -D warnings) || exit 1; done'
        language: rust
        files: \.rs$
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        description: unit test for the project
        entry: bash -c 'bash scripts/quality/check_rust_test_env.sh && for dir in chat swiftide-pgvector frontend/apps/desktop/src-tauri; do (cd $dir && cargo nextest run --all-features -- --include-ignored) || exit 1; done'
        language: rust
        files: \.rs$
        pass_filenames: false
