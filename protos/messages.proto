syntax = "proto3";

package analytics;

/// 用户事件
message AnalyticsEvent {
  EventContext context = 1;

  oneof event_type {
    AppStartEvent app_start = 8;
    AppExitEvent app_exit = 9;
    UserLoginEvent user_login = 10;
    UserLogoutEvent user_logout = 11;
    UserRegisterEvent user_register = 12;
    ChatCreatedEvent chat_created = 13;
    MessageSentEvent message_sent = 14;
    ChatJoinedEvent chat_joined = 15;
    ChatLeftEvent chat_left = 16;
    NavigationEvent navigation = 17;
    JudgeRealtimeRefreshEvent judge_realtime_refresh = 18;
  }
}

/// 应用启动事件
message AppStartEvent {
}

/// 应用退出事件
message AppExitEvent {
  enum ExitCode {
    EXIT_CODE_UNSPECIFIED = 0;
    EXIT_CODE_SUCCESS = 1;
    EXIT_CODE_FAILURE = 2;
  }
  ExitCode exit_code = 1;
}

/// 用户登录事件
message UserLoginEvent {
  /// 兼容字段：仅在邮箱登录时写入，后续将逐步淘汰
  string email = 1;
  /// 登录账号类型：email/phone/wechat/unknown
  string account_type = 2;
  /// 账号标识的哈希值（避免直接落明文 PII）
  string account_identifier_hash = 3;
  /// 认证成功后的用户 ID（字符串化）
  string user_id = 4;
}

/// 用户登出事件
message UserLogoutEvent {
  /// 兼容字段：仅在邮箱登录时写入，后续将逐步淘汰
  string email = 1;
  /// 登出账号类型：email/phone/wechat/unknown
  string account_type = 2;
  /// 账号标识的哈希值（避免直接落明文 PII）
  string account_identifier_hash = 3;
  /// 登出时用户 ID（字符串化）
  string user_id = 4;
}

/// 用户注册事件
message UserRegisterEvent {
  /// 兼容字段：仅在邮箱注册时写入，后续将逐步淘汰
  string email = 1;
  reserved 2;
  /// 注册账号类型：email/phone/wechat/unknown
  string account_type = 3;
  /// 账号标识的哈希值（避免直接落明文 PII）
  string account_identifier_hash = 4;
  /// 注册成功后的用户 ID（字符串化）
  string user_id = 5;
}

/// chat 创建事件
message ChatCreatedEvent {
  reserved 1;
}

/// 消息发送事件
message MessageSentEvent {
  /// chat ID
  string chat_id = 1;
  /// 消息类型
  string type = 2;
  /// 消息大小
  int32 size = 3;
  /// 附件数量
  int32 total_files = 4;
}

/// 加入聊天事件
message ChatJoinedEvent {
  /// chat ID
  string chat_id = 1;
}

/// 离开聊天事件
message ChatLeftEvent {
  /// chat ID
  string chat_id = 1;
}

/// 页面切换事件
message NavigationEvent {
  /// 当前页面
  string from = 1;
  /// 目标页面
  string to = 2;
}

/// AI Judge 判决页实时刷新事件
message JudgeRealtimeRefreshEvent {
  /// 辩论 session id
  string debate_session_id = 1;
  /// 触发来源事件类型（例如 DebateJudgeReportReady）
  string source_event_type = 2;
  /// 刷新结果（success/failure）
  string result = 3;
  /// 本次刷新成功或失败时的尝试次数
  int32 attempts = 4;
  /// 本轮累计重试次数
  int32 retry_count = 5;
  /// 本轮累计合并事件数
  int32 coalesced_events = 6;
  /// 错误文本（success 时为空）
  string error_message = 7;
}

/// 事件上下文
message EventContext {
  /// 客户端 ID
  string client_id = 1;
  /// 应用版本
  string app_version = 2;
  /// 系统信息
  SystemInfo system = 3;
  /// 用户 ID
  string user_id = 4;
  /// 客户端 IP
  string ip = 5;
  /// 用户代理
  string user_agent = 6;
  /// 地理位置
  GeoLocation geo = 7;
  /// 客户端时间戳
  int64 client_ts = 8;
  /// 服务器时间戳
  int64 server_ts = 9;
}

/// 系统信息
message SystemInfo {
  /// 操作系统
  string os = 1;
  /// 系统架构
  string arch = 2;
  /// 用户语言
  string locale = 3;
  /// 用户时区
  string timezone = 4;
}

message GeoLocation {
  string country = 1;
  string region = 2;
  string city = 3;
}
