name: build

on:
  push:
    branches:
      - master
      - release/**
    tags:
      - v*
  pull_request:
    branches:
      - master

permissions:
  contents: write

env:
  SUBDIRS: chat swiftide-pgvector frontend/apps/desktop/src-tauri
  RUST_TOOLCHAIN: "1.94.1"
  CARGO_LLVM_COV_VERSION: "0.6.17"
  CARGO_NEXTEST_VERSION: "0.9.98"
  CARGO_AUDIT_VERSION: "0.22.1"
  CARGO_DENY_VERSION: "0.19.1"

jobs:
  build-rust:
    strategy:
      matrix:
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    services:
      postgres:
        image: postgres:14.5
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
      - name: install dependencies
        run: |
          sudo apt-get update
          # see https://github.com/tauri-apps/tauri/issues/3701
          sudo apt-get install -y javascriptcoregtk-4.1 libsoup-3.0 webkit2gtk-4.1 pkg-config libssl-dev
          # sudo apt-get install libgtk-3-dev
          # sudo apt-get install libsoup-3.0-dev
      - name: Install Rust toolchain (pinned)
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component llvm-tools-preview,rustfmt,clippy
          rustup default "${RUST_TOOLCHAIN}"
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@${{ env.CARGO_LLVM_COV_VERSION }}
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@${{ env.CARGO_NEXTEST_VERSION }}
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@${{ env.CARGO_AUDIT_VERSION }}
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@${{ env.CARGO_DENY_VERSION }}
      - name: Setup Python for pip-audit
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
      - uses: Swatinem/rust-cache@v2
      - name: Check oversized backend files
        run: bash scripts/quality/check_oversized_backend_files.sh --threshold 700
      - name: Check code format
        run: |
          for dir in ${{ env.SUBDIRS }}; do
            cd $dir
            cargo fmt --all -- --check
            cd ..
          done
      - name: Check the package for errors
        run: |
          for dir in ${{ env.SUBDIRS }}; do
            cd $dir
            cargo check --all
            cd ..
          done
      - name: Lint rust sources
        run: |
          for dir in ${{ env.SUBDIRS }}; do
            cd $dir
            cargo clippy --all-targets --all-features --tests --benches -- -D warnings
            cd ..
          done
      - name: Check Rust nextest prerequisites
        run: bash scripts/quality/check_rust_test_env.sh
      - name: Execute rust tests
        run: |
          for dir in ${{ env.SUBDIRS }}; do
            cd $dir
            cargo nextest run --all-features
            cd ..
          done
      - name: Supply chain security gate
        run: |
          bash scripts/release/supply_chain_security_gate.sh \
            --root "$GITHUB_WORKSPACE" \
            --python-bin python \
            --report-out "$GITHUB_WORKSPACE/docs/loadtest/evidence/供应链安全门禁报告-ci-${GITHUB_SHA}.md"
      - name: Supply chain allowlist expiry patrol
        run: |
          bash scripts/release/supply_chain_allowlist_expiry_check.sh \
            --root "$GITHUB_WORKSPACE" \
            --warning-days 7 \
            --report-out "$GITHUB_WORKSPACE/docs/loadtest/evidence/供应链allowlist到期巡检报告-ci-${GITHUB_SHA}.md"
      - name: Supply chain preprod chaos drill (release preflight evidence)
        if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/')
        run: |
          bash scripts/release/supply_chain_preprod_chaos_drill.sh \
            --root "$GITHUB_WORKSPACE" \
            --report-out "$GITHUB_WORKSPACE/docs/loadtest/evidence/供应链预发故障注入演练报告-preflight-${GITHUB_SHA}.md" \
            --evidence-out "$GITHUB_WORKSPACE/docs/loadtest/evidence/supply_chain_preprod_chaos-preflight-${GITHUB_SHA}.env"
      - name: Supply chain SBOM and license attestation (release preflight evidence)
        if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/')
        run: |
          bash scripts/release/supply_chain_sbom_attestation.sh \
            --root "$GITHUB_WORKSPACE" \
            --cargo-deny-bin cargo-deny \
            --python-bin python \
            --python-requirements "$GITHUB_WORKSPACE/ai_judge_service/requirements.txt" \
            --report-out "$GITHUB_WORKSPACE/docs/loadtest/evidence/供应链SBOM与许可证证明报告-preflight-${GITHUB_SHA}.md" \
            --rust-sbom-out "$GITHUB_WORKSPACE/docs/loadtest/evidence/supply_chain_rust_sbom-preflight-${GITHUB_SHA}.json" \
            --python-sbom-out "$GITHUB_WORKSPACE/docs/loadtest/evidence/supply_chain_python_sbom-preflight-${GITHUB_SHA}.json" \
            --license-attestation-out "$GITHUB_WORKSPACE/docs/loadtest/evidence/supply_chain_license_attestation-preflight-${GITHUB_SHA}.env" \
            --evidence-out "$GITHUB_WORKSPACE/docs/loadtest/evidence/supply_chain_sbom_attestation-preflight-${GITHUB_SHA}.env"
      - name: Release preflight hard enforcement
        if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/')
        run: |
          CHAT_PRECHECK="$RUNNER_TEMP/chat.release.preflight.yml"
          AI_ENV_PRECHECK="$RUNNER_TEMP/ai_judge.release.preflight.env"
          cat >"$CHAT_PRECHECK" <<'YAML'
          payment:
            verify_mode: apple
            apple_verify_url_prod: https://buy.itunes.apple.com/verifyReceipt
            apple_verify_url_sandbox: https://sandbox.itunes.apple.com/verifyReceipt
          YAML
          cat >"$AI_ENV_PRECHECK" <<'ENV'
          AI_JUDGE_PROVIDER=openai
          AI_JUDGE_OPENAI_FALLBACK_TO_MOCK=false
          OPENAI_API_KEY=release-preflight-placeholder
          ENV

          bash scripts/release/appstore_preflight_check.sh \
            --runtime-env production \
            --root "$GITHUB_WORKSPACE" \
            --chat-config "$CHAT_PRECHECK" \
            --ai-judge-env "$AI_ENV_PRECHECK" \
            --enforce-supply-chain-security \
            --supply-chain-report-out "$GITHUB_WORKSPACE/docs/loadtest/evidence/供应链安全门禁报告-preflight-${GITHUB_SHA}.md" \
            --supply-chain-cargo-allowlist "$GITHUB_WORKSPACE/scripts/release/security_allowlists/cargo_deny_advisories_allowlist.csv" \
            --supply-chain-pip-allowlist "$GITHUB_WORKSPACE/scripts/release/security_allowlists/pip_audit_vulns_allowlist.csv" \
            --enforce-supply-chain-chaos-evidence \
            --supply-chain-chaos-evidence "$GITHUB_WORKSPACE/docs/loadtest/evidence/supply_chain_preprod_chaos-preflight-${GITHUB_SHA}.env" \
            --supply-chain-chaos-max-age-hours 168 \
            --enforce-supply-chain-sbom-attestation \
            --supply-chain-sbom-evidence "$GITHUB_WORKSPACE/docs/loadtest/evidence/supply_chain_sbom_attestation-preflight-${GITHUB_SHA}.env" \
            --supply-chain-sbom-max-age-hours 168
      - name: Upload supply chain security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-security-report-${{ github.sha }}
          path: docs/loadtest/evidence/供应链安全门禁报告-ci-${{ github.sha }}.md
          if-no-files-found: warn
      - name: Upload supply chain allowlist expiry report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-allowlist-expiry-report-${{ github.sha }}
          path: docs/loadtest/evidence/供应链allowlist到期巡检报告-ci-${{ github.sha }}.md
          if-no-files-found: warn
      - name: Upload release preflight supply chain report
        if: always() && (startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/'))
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-preflight-report-${{ github.sha }}
          path: docs/loadtest/evidence/供应链安全门禁报告-preflight-${{ github.sha }}.md
          if-no-files-found: warn
      - name: Upload release preflight supply chain chaos drill report
        if: always() && (startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/'))
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-chaos-preflight-report-${{ github.sha }}
          path: docs/loadtest/evidence/供应链预发故障注入演练报告-preflight-${{ github.sha }}.md
          if-no-files-found: warn
      - name: Upload release preflight supply chain chaos evidence
        if: always() && (startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/'))
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-chaos-preflight-evidence-${{ github.sha }}
          path: docs/loadtest/evidence/supply_chain_preprod_chaos-preflight-${{ github.sha }}.env
          if-no-files-found: warn
      - name: Upload release preflight supply chain SBOM and license report
        if: always() && (startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/'))
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-sbom-preflight-report-${{ github.sha }}
          path: docs/loadtest/evidence/供应链SBOM与许可证证明报告-preflight-${{ github.sha }}.md
          if-no-files-found: warn
      - name: Upload release preflight supply chain SBOM and license evidence
        if: always() && (startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/'))
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-sbom-preflight-evidence-${{ github.sha }}
          path: |
            docs/loadtest/evidence/supply_chain_rust_sbom-preflight-${{ github.sha }}.json
            docs/loadtest/evidence/supply_chain_python_sbom-preflight-${{ github.sha }}.json
            docs/loadtest/evidence/supply_chain_license_attestation-preflight-${{ github.sha }}.env
            docs/loadtest/evidence/supply_chain_sbom_attestation-preflight-${{ github.sha }}.env
          if-no-files-found: warn
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v2
        id: git-cliff
        if: startsWith(github.ref, 'refs/tags/')
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: ${{ steps.git-cliff.outputs.content }}

  python-quality:
    name: python-quality (ai_judge_service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: |
          cd ai_judge_service
          uv sync --frozen --group dev --python 3.11 --no-install-project
      - name: Ruff lint
        run: |
          cd ai_judge_service
          .venv/bin/ruff check .
      - name: Ruff format check
        run: |
          cd ai_judge_service
          .venv/bin/ruff format --check .
      - name: Pyright
        run: |
          cd ai_judge_service
          .venv/bin/pyright
      - name: Mypy
        run: |
          cd ai_judge_service
          .venv/bin/mypy
      - name: Pytest
        run: |
          cd ai_judge_service
          .venv/bin/pytest -q
      - name: requirements.txt drift check
        run: |
          cd ai_judge_service
          uv export \
            --frozen \
            --format requirements.txt \
            --no-dev \
            --no-emit-project \
            --no-header \
            --no-annotate \
            --no-hashes \
            --output-file /tmp/ai_judge_requirements.txt
          diff -u requirements.txt /tmp/ai_judge_requirements.txt

  python-quality-py313-preview:
    name: python-quality preview (3.13, non-blocking)
    if: github.event_name == 'pull_request'
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: |
          cd ai_judge_service
          uv sync --frozen --group dev --python 3.13 --no-install-project
      - name: Preview checks
        run: |
          cd ai_judge_service
          .venv/bin/pyright
          .venv/bin/pytest -q
