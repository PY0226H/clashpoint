  { id = "RUSTSEC-2024-0399", reason = "temporary waiver while upgrading rustls chain" },
  { id = "RUSTSEC-2026-0044", reason = "temporary waiver while upgrading aws-lc-sys certificate chain" },
  { id = "RUSTSEC-2026-0048", reason = "temporary waiver while upgrading aws-lc-sys CRL chain" },
